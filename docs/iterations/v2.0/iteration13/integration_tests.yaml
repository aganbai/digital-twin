# V2.0 IT13 集成测试用例

# 迭代信息
iteration: 13
version: "2.0"
description: |
  教材配置流程重构集成测试
  - 创建班级+教材配置流程
  - 编辑班级+教材配置流程
  - API兼容性测试
  - 异常场景和边界条件

generated_at: "2026-04-09"

# 测试用例
cases:
  # ==================== Part 1: 创建班级+教材配置 ====================

  - case_id: INT-001
    name: 创建班级时同时创建教材配置-小学学段
    type: api
    priority: P0
    module: BE-IT13-001
    description: 验证创建班级时同时传入完整教材配置参数，两者同时创建成功
    preconditions:
      - 用户已登录且为教师角色
      - 用户名下无同名班级
    steps:
      - action: POST /api/classes
        data:
          name: "三年级数学班"
          description: "小学数学培优班级"
          persona_nickname: "王老师"
          persona_school: "实验小学"
          persona_description: "10年教学经验"
          is_public: true
          curriculum_config:
            grade_level: "primary"
            grade: "三年级"
            subjects: ["数学", "语文"]
            textbook_versions: ["人教版"]
            custom_textbooks: []
            current_progress: "第三单元"
    expected:
      - status_code: 200
      - json_path: "code" == 0
      - json_path: "data.id" exists
      - json_path: "data.persona_id" exists
      - store: class_id = data.id
      - store: persona_id = data.persona_id
    post_steps:
      - action: GET /api/classes/{class_id}
        expected:
          - json_path: "data.curriculum_config" exists
          - json_path: "data.curriculum_config.grade_level" == "primary"
          - json_path: "data.curriculum_config.grade" == "三年级"
          - json_path: "data.curriculum_config.subjects" contains "数学"
          - json_path: "data.curriculum_config.textbook_versions" contains "人教版"

  - case_id: INT-002
    name: 创建班级时同时创建教材配置-大学学段
    type: api
    priority: P0
    module: BE-IT13-001
    description: 验证大学及以上学段支持自定义教材
    preconditions:
      - 用户已登录且为教师角色
    steps:
      - action: POST /api/classes
        data:
          name: "大学英语班"
          persona_nickname: "张老师"
          persona_school: "XX大学"
          persona_description: "英语教学"
          curriculum_config:
            grade_level: "university"
            subjects: ["英语"]
            custom_textbooks: ["《新编大学英语》", "《托福词汇》"]
            current_progress: "Unit 3"
    expected:
      - status_code: 200
      - json_path: "code" == 0
      - store: class_id = data.id
    post_steps:
      - action: GET /api/classes/{class_id}
        expected:
          - json_path: "data.curriculum_config.grade_level" == "university"
          - json_path: "data.curriculum_config.custom_textbooks.0" == "《新编大学英语》"

  - case_id: INT-003
    name: 创建班级时不传教材配置
    type: api
    priority: P0
    module: BE-IT13-001
    description: 验证不传curriculum_config时班级正常创建，无教材配置
    preconditions:
      - 用户已登录且为教师角色
    steps:
      - action: POST /api/classes
        data:
          name: "临时班级"
          persona_nickname: "李老师"
          persona_school: "XX学校"
          persona_description: "临时班级"
          is_public: false
    expected:
      - status_code: 200
      - json_path: "code" == 0
      - store: class_id = data.id
    post_steps:
      - action: GET /api/classes/{class_id}
        expected:
          - json_path: "data.curriculum_config" == null

  - case_id: INT-004
    name: 创建班级时教材配置部分字段
    type: api
    priority: P1
    module: BE-IT13-001
    description: 验证只传部分教材配置字段也能正常创建
    preconditions:
      - 用户已登录且为教师角色
    steps:
      - action: POST /api/classes
        data:
          name: "测试班级-部分配置"
          persona_nickname: "赵老师"
          persona_school: "XX学校"
          persona_description: "测试"
          curriculum_config:
            grade_level: "middle"
            subjects: ["数学"]
    expected:
      - status_code: 200
      - json_path: "code" == 0
      - store: class_id = data.id
    post_steps:
      - action: GET /api/classes/{class_id}
        expected:
          - json_path: "data.curriculum_config.grade_level" == "middle"
          - json_path: "data.curriculum_config.subjects.0" == "数学"

  # ==================== Part 2: 编辑班级+教材配置 ====================

  - case_id: INT-005
    name: 编辑已有配置的班级-修改配置
    type: api
    priority: P0
    module: BE-IT13-001
    description: 验证编辑时更新已有教材配置
    preconditions:
      - 已存在带教材配置的班级
    setup_steps:
      - action: POST /api/classes
        data:
          name: "编辑测试班-原配置"
          persona_nickname: "测试老师"
          persona_school: "XX学校"
          persona_description: "测试"
          curriculum_config:
            grade_level: "primary"
            grade: "二年级"
            subjects: ["语文"]
        expected:
          - store: class_id = data.id
    steps:
      - action: PUT /api/classes/{class_id}
        data:
          name: "编辑测试班-已修改"
          curriculum_config:
            grade_level: "primary"
            grade: "三年级"
            subjects: ["语文", "数学"]
            textbook_versions: ["苏教版"]
            current_progress: "第五单元"
    expected:
      - status_code: 200
      - json_path: "code" == 0
    post_steps:
      - action: GET /api/classes/{class_id}
        expected:
          - json_path: "data.name" == "编辑测试班-已修改"
          - json_path: "data.curriculum_config.grade" == "三年级"
          - json_path: "data.curriculum_config.subjects" length 2
          - json_path: "data.curriculum_config.textbook_versions.0" == "苏教版"

  - case_id: INT-006
    name: 编辑无配置的班级-新增配置
    type: api
    priority: P0
    module: BE-IT13-001
    description: 验证无教材配置的班级可以新增配置
    preconditions:
      - 已存在无教材配置的班级
    setup_steps:
      - action: POST /api/classes
        data:
          name: "新增配置测试班"
          persona_nickname: "测试老师"
          persona_school: "XX学校"
          persona_description: "测试"
        expected:
          - store: class_id = data.id
      - action: GET /api/classes/{class_id}
        expected:
          - json_path: "data.curriculum_config" == null
    steps:
      - action: PUT /api/classes/{class_id}
        data:
          curriculum_config:
            grade_level: "high"
            grade: "高一"
            subjects: ["物理", "化学"]
            textbook_versions: ["人教版"]
    expected:
      - status_code: 200
      - json_path: "code" == 0
    post_steps:
      - action: GET /api/classes/{class_id}
        expected:
          - json_path: "data.curriculum_config" exists
          - json_path: "data.curriculum_config.grade_level" == "high"

  - case_id: INT-007
    name: 编辑班级时不传curriculum_config保持原状
    type: api
    priority: P1
    module: BE-IT13-001
    description: 验证编辑时不传curriculum_config字段，原有配置保持不变
    preconditions:
      - 已存在带教材配置的班级
    setup_steps:
      - action: POST /api/classes
        data:
          name: "保持不变测试班"
          persona_nickname: "测试老师"
          persona_school: "XX学校"
          persona_description: "测试"
          curriculum_config:
            grade_level: "junior"
            grade: "七年级"
            subjects: ["英语"]
            current_progress: "Unit 1"
        expected:
          - store: class_id = data.id
    steps:
      - action: PUT /api/classes/{class_id}
        data:
          name: "保持不变测试班-已更名"
    expected:
      - status_code: 200
    post_steps:
      - action: GET /api/classes/{class_id}
        expected:
          - json_path: "data.name" == "保持不变测试班-已更名"
          - json_path: "data.curriculum_config.grade_level" == "junior"
          - json_path: "data.curriculum_config.current_progress" == "Unit 1"

  # ==================== Part 3: 异常场景 ====================

  - case_id: INT-008
    name: 创建班级时非法grade_level
    type: api
    priority: P1
    module: BE-IT13-001
    description: 验证传入非法学段值时API返回错误
    preconditions:
      - 用户已登录且为教师角色
    steps:
      - action: POST /api/classes
        data:
          name: "非法学段测试班"
          persona_nickname: "测试老师"
          persona_school: "XX学校"
          persona_description: "测试"
          curriculum_config:
            grade_level: "invalid_level"
            grade: "三年级"
    expected:
      - status_code: 400
      - json_path: "code" == 40041
      - json_path: "message" contains "无效"

  - case_id: INT-009
    name: 非教师角色创建班级
    type: api
    priority: P1
    module: BE-IT13-001
    description: 验证学生角色无法创建班级
    preconditions:
      - 用户已登录且为学生角色
    steps:
      - action: POST /api/classes
        data:
          name: "学生创建测试班"
          persona_nickname: "学生"
          persona_school: "XX学校"
          persona_description: "测试"
    expected:
      - status_code: 403
      - json_path: "code" == 40301

  - case_id: INT-010
    name: 编辑无权限的班级
    type: api
    priority: P1
    module: BE-IT13-001
    description: 验证不能编辑其他教师的班级
    preconditions:
      - 教师A已创建班级
      - 使用教师B的token
    setup_steps:
      - action: create_class
        as_role: teacher_a
        data:
          name: "教师A的班级"
    steps:
      - action: PUT /api/classes/{teacher_a_class_id}
        as_role: teacher_b
        data:
          name: "尝试修改"
    expected:
      - status_code: 403
      - json_path: "code" == 40018

  - case_id: INT-011
    name: 创建班级时名称重复
    type: api
    priority: P1
    module: BE-IT13-001
    description: 验证同名班级创建失败
    preconditions:
      - 用户名下已存在"重复名称测试班"
    setup_steps:
      - action: POST /api/classes
        data:
          name: "重复名称测试班"
          persona_nickname: "老师A"
          persona_school: "XX学校"
          persona_description: "测试"
    steps:
      - action: POST /api/classes
        data:
          name: "重复名称测试班"
          persona_nickname: "老师B"
          persona_school: "XX学校"
          persona_description: "测试"
    expected:
      - status_code: 409
      - json_path: "code" == 40030

  # ==================== Part 4: API兼容性测试 ====================

  - case_id: INT-012
    name: 旧版本客户端不传curriculum_config
    type: api
    priority: P0
    module: QA-IT13-002
    description: 验证旧版本客户端不传新字段时API正常响应
    preconditions:
      - 使用旧版本API调用格式（不含curriculum_config）
    steps:
      - action: POST /api/classes
        header:
          API-Version: "2.0"
        data:
          name: "旧版本兼容测试班"
          persona_nickname: "兼容测试老师"
          persona_school: "XX学校"
          persona_description: "测试旧版本兼容"
    expected:
      - status_code: 200
      - json_path: "code" == 0
      - json_path: "data.id" exists

  - case_id: INT-013
    name: 获取班级列表包含配置信息
    type: api
    priority: P1
    module: BE-IT13-001
    description: 验证班级列表接口正常，包含新字段
    steps:
      - action: GET /api/classes
    expected:
      - status_code: 200
      - json_path: "code" == 0
      - json_path: "data" is_array

  - case_id: INT-014
    name: 原curriculum-config API仍可用
    type: api
    priority: P1
    module: QA-IT13-002
    description: 验证原有独立教材配置API功能正常（用于降级）
    steps:
      - action: POST /api/curriculum-configs
        data:
          grade_level: "primary"
          grade: "二年级"
          subjects: ["语文"]
    expected:
      - status_code: 200
      - json_path: "code" == 0

  # ==================== Part 5: 边界条件 ====================

  - case_id: INT-015
    name: 教材配置字段超长边界
    type: api
    priority: P2
    module: BE-IT13-001
    description: 验证current_progress字段超长时处理
    preconditions:
      - 用户已登录且为教师角色
    steps:
      - action: POST /api/classes
        data:
          name: "超长进度测试班"
          persona_nickname: "测试老师"
          persona_school: "XX学校"
          persona_description: "测试"
          curriculum_config:
            grade_level: "primary"
            grade: "三年级"
            current_progress: "Very long progress description that exceeds normal length limits and should be handled appropriately by the system"
    expected:
      - status_code: 200
      - json_path: "code" == 0
    notes: 数据库字段应支持足够长度或自动截断

  - case_id: INT-016
    name: 教材配置空数组处理
    type: api
    priority: P1
    module: BE-IT13-001
    description: 验证subjects和textbook_versions传空数组时正常
    preconditions:
      - 用户已登录且为教师角色
    steps:
      - action: POST /api/classes
        data:
          name: "空数组测试班"
          persona_nickname: "测试老师"
          persona_school: "XX学校"
          persona_description: "测试"
          curriculum_config:
            grade_level: "primary"
            grade: "三年级"
            subjects: []
            textbook_versions: []
    expected:
      - status_code: 200
      - json_path: "code" == 0
    post_steps:
      - action: GET /api/classes/{class_id}
        expected:
          - json_path: "data.curriculum_config.subjects" == []
          - json_path: "data.curriculum_config.textbook_versions" == []

  - case_id: INT-017
    name: 教材配置特殊字符处理
    type: api
    priority: P1
    module: BE-IT13-001
    description: 验证current_progress包含特殊字符时正常存储
    preconditions:
      - 用户已登录且为教师角色
    steps:
      - action: POST /api/classes
        data:
          name: "特殊字符测试班"
          persona_nickname: "测试老师"
          persona_school: "XX学校"
          persona_description: "测试"
          curriculum_config:
            grade_level: "primary"
            current_progress: "第三单元（重点：乘法运算 <script>alert(1)</script>）"
    expected:
      - status_code: 200
      - json_path: "code" == 0
    notes: 应正确处理或转义特殊字符，防止XSS

  # ==================== Part 6: 事务一致性 ====================

  - case_id: INT-018
    name: 班级创建成功但配置创建失败
    type: api
    priority: P1
    module: BE-IT13-001
    description: 验证班级创建和配置创建的原子性
    preconditions:
      - 用户已登录且为教师角色
    steps:
      - action: POST /api/classes
        data:
          name: "事务测试班"
          persona_nickname: "测试老师"
          persona_school: "XX学校"
          persona_description: "测试"
          curriculum_config:
            grade_level: "primary"
            grade: "三年级"
            subjects: ["数学"]
    expected:
      - status_code: 200
      - json_path: "code" == 0
      - store: class_id = data.id
    notes: |
      即使配置创建失败（如数据库异常），班级也应创建成功
      配置失败应记录日志但不中断主流程

  # ==================== Part 7: 多端数据一致性 ====================

  - case_id: INT-019
    name: 小程序端创建H5端查看
    type: api
    priority: P1
    module: QA-IT13-001
    description: 验证小程序端创建的班级配置在H5端正确显示
    preconditions:
      - 用户已登录且为教师角色
    setup_steps:
      - action: POST /api/classes
        platform: miniprogram
        data:
          name: "多端一致性测试班"
          persona_nickname: "测试老师"
          persona_school: "XX学校"
          persona_description: "测试"
          curriculum_config:
            grade_level: "middle"
            grade: "八年级"
            subjects: ["物理"]
            textbook_versions: ["人教版"]
        expected:
          - store: class_id = data.id
    steps:
      - action: GET /api/classes/{class_id}
        platform: h5_teacher
    expected:
      - status_code: 200
      - json_path: "data.name" == "多端一致性测试班"
      - json_path: "data.curriculum_config.grade_level" == "middle"
      - json_path: "data.curriculum_config.subjects.0" == "物理"

# 测试数据清理脚本
cleanup:
  - delete classes created by test cases
  - delete personas created by test cases
  - delete teacher_curriculum_configs created by test cases

# 环境要求
environment:
  backend: http://localhost:8080
  database_required: true
  test_accounts:
    - role: teacher
      username: test_teacher
    - role: student
      username: test_student
