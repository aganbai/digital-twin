## 4. 数据验证测试

### 4.1 数据一致性验证

```yaml
- test_id: "IT12-INT-011"
  name: "会话数据一致性测试"
  description: "验证前端显示与后端数据的一致性"

  validation_points:
    - point: "会话列表数据"
      frontend_field: "sessionList"
      backend_source: "/api/sessions"
      validation: "数据完全一致"

    - point: "当前会话状态"
      frontend_field: "currentSessionId"
      backend_source: "会话服务"
      validation: "状态同步"

    - point: "消息类型存储"
      frontend_action: "发送留言指令"
      backend_check: "messages表message_type字段"
      expected_value: "teacher_message_direct"
```

### 4.2 状态同步验证

```yaml
- test_id: "IT12-INT-012"
  name: "多端状态同步测试"
  description: "验证不同操作后状态的正确同步"

  test_cases:
    - case: "中断后状态同步"
      action: "中断流式回复"
      check_points:
        - "isStreaming: false"
        - "streamingContent: ''"
        - "显示发送按钮"

    - case: "会话切换状态同步"
      action: "切换历史会话"
      check_points:
        - "currentSessionId 更新"
        - "messageList 更新"
        - "输入框状态重置"

    - case: "新会话状态同步"
      action: "创建新会话"
      check_points:
        - "currentSessionId: ''"
        - "messageList: []"
        - "显示创建提示"
```

