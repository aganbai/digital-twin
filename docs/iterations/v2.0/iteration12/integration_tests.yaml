## 5. 错误处理测试

### 5.1 网络异常处理

```yaml
- test_id: "IT12-INT-013"
  name: "网络异常场景测试"
  description: "测试网络异常情况下的用户体验"

  scenarios:
    - scenario: "中断接口网络超时"
      simulation: "网络延迟5s"
      expected: "显示超时提示，允许重试"

    - scenario: "会话列表加载失败"
      simulation: "模拟404错误"
      expected: "显示错误状态，提供重试按钮"

    - scenario: "指令发送失败"
      simulation: "网络断开"
      expected: "保留指令状态，网络恢复后重试"
```

### 5.2 服务端异常处理

```yaml
- test_id: "IT12-INT-014"
  name: "服务端异常场景测试"
  description: "测试服务端返回错误时的处理"

  scenarios:
    - scenario: "中断接口服务错误"
      mock_response: "500 Internal Server Error"
      expected: "显示服务异常提示"

    - scenario: "会话列表数据异常"
      mock_response: "数据格式错误"
      expected: "显示数据加载失败"

    - scenario: "消息发送限流"
      mock_response: "429 Too Many Requests"
      expected: "显示限流提示，延迟重试"
```

