## 5. 模块 D：知识库与语义检索集成测试（6条）

```yaml
- test_id: "IT12-INT-D01"
  name: "知识库CRUD完整流程"
  description: "验证文本/文件/URL/聊天记录导入和管理"
  priority: P0
  module: "知识库"
  steps:
    - step: 1
      action: "添加文本文档"
      request: "POST /api/documents { title, content }"
    - step: 2
      action: "查看文档列表"
      request: "GET /api/documents"
    - step: 3
      action: "智能上传（V8统一输入框）"
      request: "POST /api/knowledge/upload"
    - step: 4
      action: "搜索知识库"
      request: "GET /api/knowledge?q=关键词"
    - step: 5
      action: "删除文档"
      request: "DELETE /api/documents/:id"
  expected_results:
    - "文本/文件/URL导入正常"
    - "搜索返回匹配结果"
    - "删除同时清理向量索引"

- test_id: "IT12-INT-D02"
  name: "向量召回策略验证（迭代11优化）"
  description: "验证召回100条→置信度过滤→scope过滤→返回≤5条"
  priority: P1
  module: "知识库+语义检索"
  steps:
    - step: 1
      action: "教师上传≥10条知识库文档"
    - step: 2
      action: "学生发送与知识库相关的消息"
      request: "POST /api/chat/stream"
    - step: 3
      action: "检查后端日志"
      expected: "召回≤100条 → score≥0.3过滤 → scope过滤 → 最终≤5条"
  expected_results:
    - "向量召回策略正确执行"
    - "最终参与对话的知识条目≤5条"

- test_id: "IT12-INT-D03"
  name: "知识库Scope三级控制验证"
