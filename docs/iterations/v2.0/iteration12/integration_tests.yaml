## 2. 模块 A：认证与登录集成测试（6条）

```yaml
- test_id: "IT12-INT-A01"
  name: "微信小程序登录 - 新用户全流程"
  description: "验证新用户从微信登录到角色选择的完整流程"
  priority: P0
  module: "认证"
  steps:
    - step: 1
      action: "微信登录"
      request: "POST /api/auth/wx-login { code: 'smoke_teacher_001' }"
      expected: "返回 token + 空 personas 列表"
    - step: 2
      action: "教师注册完善资料"
      request: "POST /api/auth/complete-profile { role: 'teacher', nickname, school, description }"
      expected: "返回成功 + test_student（迭代11：不返回教师 persona_id）"
    - step: 3
      action: "验证自测学生已自动创建"
      request: "GET /api/test-student"
      expected: "返回 user_id/username=teacher_{id}_test/persona_id"
  expected_results:
    - "微信登录返回有效 JWT token"
    - "教师注册不创建分身（迭代11变更）"
    - "自测学生账号自动创建"
  cleanup:
    - "保留测试账号供后续用例使用"

- test_id: "IT12-INT-A02"
  name: "学生注册与登录全流程"
  description: "验证学生角色注册和已有账号登录"
  priority: P0
  module: "认证"
  steps:
    - step: 1
      action: "学生微信登录"
      request: "POST /api/auth/wx-login { code: 'smoke_student_001' }"
    - step: 2
      action: "学生注册"
      request: "POST /api/auth/complete-profile { role: 'student', nickname }"
      expected: "返回 persona_id + 新 token"
    - step: 3
      action: "Token 刷新"
      request: "POST /api/auth/refresh"
      expected: "返回新 token"
  expected_results:
    - "学生注册返回 persona_id"
    - "Token 刷新成功"

- test_id: "IT12-INT-A03"
  name: "H5微信OAuth登录流程"
  description: "验证H5端微信网页授权登录（迭代10）"
  priority: P0
  module: "认证"
  steps:
    - step: 1
      action: "获取H5授权URL"
      request: "GET /api/auth/wx-h5-login-url?redirect_uri=xxx"
      expected: "返回 auth_url + state"
    - step: 2
      action: "H5授权回调"
      request: "POST /api/auth/wx-h5-callback { code, state }"
      expected: "返回 token + is_new_user"
  expected_results:
    - "H5授权URL正确生成"
    - "回调成功返回JWT token"

- test_id: "IT12-INT-A04"
  name: "用户禁用与Token失效"
  description: "验证管理员禁用用户后token立即失效（迭代10）"
  priority: P0
  module: "认证+管理员"
  steps:
    - step: 1
      action: "管理员禁用用户"
      request: "PUT /api/admin/users/:id/status { status: 'disabled' }"
    - step: 2
      action: "被禁用用户访问API"
      request: "GET /api/personas（被禁用用户token）"
      expected: "返回 403 '账号已被禁用'"
    - step: 3
      action: "被禁用用户重新登录"
      request: "POST /api/auth/wx-h5-callback"
      expected: "返回 40003 '账号已被禁用'"
  expected_results:
    - "禁用后所有API返回403"
    - "禁用后登录被拒"
```

## 3. 模块 B：分身与班级管理集成测试（8条）

```yaml
- test_id: "IT12-INT-B01"
  name: "创建班级同步创建分身（迭代11核心流程）"
  description: "验证班级创建时自动创建专属分身的完整事务"
  priority: P0
  module: "班级管理+分身管理"
  steps:
    - step: 1
      action: "教师创建班级（含分身信息）"
      request: "POST /api/classes { name, persona_nickname, persona_school, persona_description, is_public: true }"
      expected: "返回班级 id + persona_id + share_code + share_url"
    - step: 2
      action: "验证分身列表含班级信息"
      request: "GET /api/personas"
      expected: "每个分身含 bound_class_id + bound_class_name + is_public"
    - step: 3
      action: "验证自测学生自动加入班级"
      request: "GET /api/classes/:id/members"
      expected: "自测学生出现在成员列表，approval_status=approved"
  expected_results:
    - "班级和分身在同一事务中创建"
    - "分身正确绑定到班级"
    - "自测学生自动加入"

- test_id: "IT12-INT-B02"
  name: "教师禁止独立创建分身 + 废弃接口返回404"
  description: "验证迭代11废弃的分身操作接口"
  priority: P0
  module: "分身管理"
  scenarios:
    - scenario: "教师POST创建分身"
      request: "POST /api/personas { role: 'teacher' }"
      expected: "返回 400, code=40040, '教师分身随班级创建'"
    - scenario: "切换分身接口"
      request: "PUT /api/personas/:id/switch"
      expected: "返回 404"
    - scenario: "启用分身接口"
      request: "PUT /api/personas/:id/activate"
      expected: "返回 404"
    - scenario: "停用分身接口"
      request: "PUT /api/personas/:id/deactivate"
      expected: "返回 404"

- test_id: "IT12-INT-B03"
  name: "班级管理CRUD完整流程"
  description: "验证班级创建、查看、更新、删除、启停完整操作"
  priority: P0
  module: "班级管理"
  steps:
    - step: 1
      action: "创建班级"
      request: "POST /api/classes"
    - step: 2
      action: "查看班级列表"
      request: "GET /api/classes"
    - step: 3
      action: "添加学生到班级"
      request: "POST /api/classes/:id/members"
    - step: 4
      action: "查看班级成员"
      request: "GET /api/classes/:id/members"
    - step: 5
      action: "班级启停"
      request: "PUT /api/classes/:id/toggle"
    - step: 6
      action: "is_public切换"
      request: "PUT /api/classes/:id { is_public: false }"
      expected: "发现页不再展示该班级"
  expected_results:
    - "班级CRUD全部正常"
    - "成员管理正常"
    - "启停功能正常"
    - "is_public切换生效"

- test_id: "IT12-INT-B04"
  name: "分享码与学生加入审批流程"
  description: "验证教师创建分享码→学生扫码→审批通过的完整流程"
  priority: P0
  module: "分享码+师生关系"
  steps:
    - step: 1
      action: "教师创建分享码"
      request: "POST /api/shares { persona_id }"
    - step: 2
      action: "学生扫码加入"
      request: "POST /api/shares/:code/join"
    - step: 3
      action: "教师查看待审批"
      request: "GET /api/join-requests/pending"
    - step: 4
      action: "教师审批通过"
      request: "PUT /api/join-requests/:id/approve"
    - step: 5
      action: "验证师生关系建立"
      request: "GET /api/relations"
  expected_results:
    - "分享码正确生成"
    - "学生加入申请成功提交"
    - "审批流程正常"
    - "师生关系正确建立"

- test_id: "IT12-INT-B05"
  name: "自测学生完整功能测试（迭代11）"
  description: "验证自测学生的创建、查看、使用和重置"
  priority: P1
  module: "自测学生"
  steps:
    - step: 1
      action: "获取自测学生信息"
      request: "GET /api/test-student"
      expected: "返回 user_id/username/persona_id/password_hint/joined_classes"
    - step: 2
      action: "用自测学生身份发送对话"
      note: "使用自测学生token + 班级分身ID发起对话"
    - step: 3
      action: "重置自测学生数据"
      request: "POST /api/test-student/reset"
      expected: "返回 cleared_conversations + cleared_memories；师生关系保留"
  expected_results:
    - "自测学生信息正确"
    - "自测学生可正常对话"
    - "重置只清对话/记忆，保留关系"
```

## 4. 模块 C：对话系统集成测试（10条）

```yaml
- test_id: "IT12-INT-C01"
  name: "SSE流式对话完整流程"
  description: "验证流式对话的发送、接收、完成"
  priority: P0
  module: "对话系统"
  steps:
    - step: 1
      action: "发送流式对话请求"
      request: "POST /api/chat/stream { session_id, message, teacher_persona_id }"
    - step: 2
      action: "监听SSE事件流"
      expected: "收到多个 data 事件，含流式回复内容"
    - step: 3
      action: "验证思考过程展示"
      expected: "收到 thinking_step 事件（RAG检索/记忆检索/LLM思考）"
    - step: 4
      action: "验证回复完成"
      expected: "收到 [DONE] 事件"
  expected_results:
    - "流式回复正常接收"
    - "思考过程事件正确推送"
    - "消息正确存储到数据库"

- test_id: "IT12-INT-C02"
  name: "流式中断功能完整测试（迭代12新增）"
  description: "验证前端中断按钮与后端中断接口的完整交互"
  priority: P0
  module: "IT12-FE-001 + IT12-BE-001"
  steps:
    - step: 1
      action: "发送消息触发流式回复"
    - step: 2
      action: "流式进行中点击停止按钮"
      request: "GET /api/chat/stream/:session_id/abort"
    - step: 3
      action: "验证中断响应"
      expected: "返回 200, {code: 0, data: {aborted: true}}"
    - step: 4
      action: "验证状态恢复"
      expected: "isStreaming=false, 已接收内容保留, 可继续发新消息"
  expected_results:
    - "中断接口调用成功"
    - "已接收内容保留在聊天记录"
    - "中断后状态正确重置"
    - "可继续发送新消息"

- test_id: "IT12-INT-C03"
  name: "中断接口异常场景"
  description: "测试中断接口各种异常情况"
  priority: P0
  module: "IT12-BE-001"
  scenarios:
    - scenario: "中断不存在的会话"
      expected: "404, code=40004"
    - scenario: "无权限中断他人会话"
      expected: "403, code=40001"
    - scenario: "重复中断（幂等）"
      expected: "200, code=0"
    - scenario: "无Token请求"
      expected: "401"
    - scenario: "快速连续中断5次"
      expected: "仅第一次生效，无竞态"

- test_id: "IT12-INT-C04"
  name: "教师真人介入对话"
  description: "验证教师接管AI对话并发送真人消息"
  priority: P0
  module: "教师介入"
  steps:
    - step: 1
      action: "教师引用回复"
      request: "POST /api/chat/teacher-reply { student_persona_id, message }"
      expected: "回复成功, sender_type=teacher"
    - step: 2
      action: "查看接管状态"
      request: "GET /api/chat/takeover-status"
      expected: "is_taken_over=true"
    - step: 3
      action: "接管后学生发消息"
      request: "POST /api/chat (学生token)"
      expected: "AI不回复或提示教师已接管"
    - step: 4
      action: "教师结束接管"
      request: "POST /api/chat/end-takeover"
      expected: "AI恢复自动回复"
  expected_results:
    - "教师回复正确标记为 teacher 类型"
    - "接管后AI停止回复"
    - "结束接管后AI恢复"

- test_id: "IT12-INT-C05"
  name: "会话列表侧边栏完整流程（迭代12新增）"
  description: "验证会话列表加载、展示、切换"
  priority: P0
  module: "IT12-FE-002 + IT12-FE-003"
  steps:
    - step: 1
      action: "打开侧边栏"
      expected: "遮罩层淡入(200ms) + 侧边栏滑入(300ms)"
    - step: 2
      action: "加载会话列表"
      request: "GET /api/sessions?teacher_persona_id=X"
      expected: "会话按更新时间倒序，当前会话高亮"
    - step: 3
      action: "切换历史会话"
      expected: "session_id 更新，消息列表刷新"
    - step: 4
      action: "关闭侧边栏"
      expected: "侧边栏滑出 + 遮罩层淡出"
  expected_results:
    - "动画流畅无卡顿"
    - "会话数据正确加载"
    - "切换会话后消息正确更新"

- test_id: "IT12-INT-C06"
  name: "新会话按钮与创建逻辑（迭代12新增）"
  description: "验证侧边栏顶部新会话按钮的创建流程"
  priority: P1
  module: "IT12-FE-004"
  steps:
    - step: 1
      action: "点击侧边栏顶部+新会话按钮"
      expected: "侧边栏关闭，消息列表清空，session_id重置"
    - step: 2
      action: "发送第一条消息"
      expected: "创建新会话，返回新 session_id"
    - step: 3
      action: "继续对话"
      expected: "使用新 session_id 正常对话"
  expected_results:
    - "新会话创建成功"
    - "保持当前分身上下文(teacher_persona_id不变)"

- test_id: "IT12-INT-C07"
  name: "指令系统完整测试（迭代12新增）"
  description: "验证所有指令的识别和处理"
  priority: P1
  module: "IT12-FE-005 + IT12-BE-002"
  test_cases:
    - input: "#新会话"
      expected_action: "清空消息列表，重置session_id"
    - input: "#新对话"
      expected_action: "同#新会话"
    - input: "#新话题"
