# 文档版本：v2.0

---

## 1. 测试环境配置

### 1.1 测试数据准备

```yaml
setup_data:
  teacher_persona_id: 1
  test_user_token: "test-token-123"
  base_url: "http://localhost:8080"
  knowledge_service_url: "http://localhost:8100"

  test_accounts:
    teacher_a:
      mock_code: "smoke_teacher_001"
      role: teacher
    teacher_b:
      mock_code: "smoke_teacher_002"
      role: teacher
    student_a:
      mock_code: "smoke_student_001"
      role: student
    student_b:
      mock_code: "smoke_student_002"
      role: student
    admin:
      role: admin
      note: "通过数据库脚本设置"

  sessions:
    - session_id: "session-001"
      title: "数学问题讨论"
      message_count: 5
    - session_id: "session-002"
      title: "物理学习"
      message_count: 3
    - session_id: "session-003"
      title: "化学实验"
      message_count: 8
```

### 1.2 测试前置条件

```yaml
prerequisites:
  - 后端服务正常运行（端口 8080）
  - Python LlamaIndex 知识服务正常运行（端口 8100）
  - 数据库连接正常（SQLite WAL模式）
  - 测试用户已登录（Bearer Token 有效）
  - 预置测试数据已加载
  - SSE 流式服务正常
```

