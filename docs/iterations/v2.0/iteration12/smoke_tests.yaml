# V2.0 迭代12 冒烟测试用例（全量覆盖版 - 30条）
# 覆盖范围：整个 digital-twin 项目全部核心功能
# 基于 docs/smoke-test-cases.md 全集精选 + 迭代12新增功能
# 生成时间：2026-04-08
# 文档版本：v2.0
# 用例总数：30条

cases:
  # ================================================================
  # Part A: 认证与基础数据准备（5条）
  # ================================================================

  - case_id: SMOKE-001
    name: 微信登录与教师注册（含自测学生创建）
    type: part_a
    source: "A-01 + A-02 + AE-01"
    priority: P0
    mock_token_type: new_teacher
    steps:
      - "POST /api/auth/wx-login { code: 'smoke_teacher_001' }"
      - "验证返回 token + 空 personas 列表"
      - "POST /api/auth/complete-profile { role: 'teacher', nickname, school, description }"
      - "验证返回成功 + test_student 信息（user_id/username）"
      - "验证不返回教师 persona_id（迭代11变更）"
      - "GET /api/test-student 验证自测学生已创建"
    expected:
      - 微信登录返回有效JWT token
      - 教师注册成功，不创建分身
      - 自测学生账号自动创建（teacher_{id}_test）
    dependencies: []

  - case_id: SMOKE-002
    name: 学生注册与登录
    type: part_a
    source: "A-03 + A-04"
    priority: P0
    mock_token_type: new_student
    steps:
      - "POST /api/auth/wx-login { code: 'smoke_student_001' }"
      - "POST /api/auth/complete-profile { role: 'student', nickname }"
      - "验证返回 persona_id + 新 token"
      - "POST /api/auth/refresh 验证Token刷新"
    expected:
      - 学生注册返回 persona_id
      - Token 刷新成功
    dependencies: [SMOKE-001]

  - case_id: SMOKE-003
    name: 创建班级（同步创建分身）+ 分身列表验证
    type: part_a
    source: "C-01 + AD-01 + AD-03 + B-02"
    priority: P0
    mock_token_type: registered_teacher
    steps:
      - "POST /api/classes { name, persona_nickname, persona_school, persona_description, is_public: true }"
      - "验证返回班级 id + persona_id + share_code + share_url"
      - "GET /api/personas 验证分身列表含 bound_class_id + bound_class_name + is_public"
      - "GET /api/classes/:id/members 验证自测学生自动加入"
    expected:
      - 班级与分身同步创建
      - 分身正确绑定班级
      - 自测学生自动加入班级
    dependencies: [SMOKE-001]

  - case_id: SMOKE-004
    name: 分享码创建 + 多学生扫码加入 + 审批通过
    type: part_a
    source: "D-01 + D-02 + D-03"
    priority: P0
    mock_token_type: mixed
    mock_accounts:
      - alias: teacher_a
        role: teacher
        code: smoke_teacher_001
        description: 主测试教师（SMOKE-001 注册的）
      - alias: student_1
        role: student
        code: smoke_student_001
        description: 学生1（SMOKE-002 注册的）
      - alias: student_2
        role: student
        code: smoke_student_002
        description: 学生2（本用例新注册）
      - alias: student_3
        role: student
        code: smoke_student_003
        description: 学生3（本用例新注册）
    steps:
      - "[teacher_a] POST /api/shares { persona_id } 创建分享码"
      - "[student_1] POST /api/shares/:code/join 扫码加入"
      - "[student_2] 注册新学生 → POST /api/shares/:code/join 扫码加入"
      - "[student_3] 注册新学生 → POST /api/shares/:code/join 扫码加入"
      - "[teacher_a] GET /api/join-requests/pending 查看待审批（应有3条）"
      - "[teacher_a] PUT /api/join-requests/:id/approve 逐一审批通过"
      - "[teacher_a] GET /api/classes/:id/members 验证成员列表（含3个学生+自测学生）"
      - "[teacher_a] UI验证：切换到教师端，查看班级成员列表排版是否正常"
      - "[student_1] UI验证：切换到学生1，查看教师列表展示是否正常"
    expected:
      - 分享码正确生成
      - 3个学生加入申请均成功
      - 审批流程正常（批量审批）
      - 师生关系正确建立
      - 教师端成员列表排版正常（多学生场景）
      - 学生端教师列表展示正常
    dependencies: [SMOKE-002, SMOKE-003]

  - case_id: SMOKE-005
    name: 教师禁止独立创建分身 + 废弃接口404验证
    type: part_a
    source: "AD-02 + AD-04 + B-05"
    priority: P0
    mock_token_type: registered_teacher
    steps:
      - "POST /api/personas { role: 'teacher' } 验证返回 400, code=40040"
      - "PUT /api/personas/:id/switch 验证返回 404"
      - "PUT /api/personas/:id/activate 验证返回 404"
      - "PUT /api/personas/:id/deactivate 验证返回 404"
    expected:
      - 教师禁止独立创建分身（40040）
      - 废弃接口全部返回404
    dependencies: [SMOKE-003]

  # ================================================================
  # Part B: 对话核心功能（8条）
  # ================================================================

  - case_id: SMOKE-006
    name: 普通消息发送与AI回复
    type: part_b
    source: "E-01"
    priority: P0
    mock_token_type: registered_student
    steps:
      - "POST /api/chat { teacher_persona_id, message: '你好' }"
      - "验证返回 AI 回复（非空）"
      - "验证 sender_type=ai"
    expected:
      - 消息发送成功
      - AI正常回复
    dependencies: [SMOKE-004]

  - case_id: SMOKE-007
    name: SSE流式对话 + 思考过程展示
    type: part_b
    source: "E-02 + E-03"
    priority: P0
    mock_token_type: registered_student
    steps:
      - "POST /api/chat/stream { session_id, message, teacher_persona_id }"
      - "监听 SSE 事件流"
      - "验证收到 thinking_step 事件（RAG/记忆/LLM）"
      - "验证收到流式回复内容"
      - "验证收到 [DONE] 事件"
    expected:
      - SSE 流式回复正常接收
      - 思考过程事件正确推送
    dependencies: [SMOKE-006]

  - case_id: SMOKE-008
    name: 流式中断功能（迭代12新增）
    type: part_b
    source: "IT12-FE-001 + IT12-BE-001"
    priority: P0
    mock_token_type: registered_student
    steps:
      - "发送消息触发流式回复"
      - "流式进行中 GET /api/chat/stream/:session_id/abort"
      - "验证返回 200, {code: 0, data: {aborted: true}}"
      - "验证已接收内容保留在聊天记录"
      - "验证 isStreaming=false，发送按钮恢复"
      - "发送新消息验证功能恢复正常"
    expected:
      - 中断接口调用成功
      - 已接收内容保留
      - 中断后状态正确重置
      - 可继续发送新消息
    dependencies: [SMOKE-007]

  - case_id: SMOKE-009
    name: 中断接口异常场景
    type: part_b
    source: "IT12-BE-001"
    priority: P0
    mock_token_type: registered_student
    steps:
      - "GET /api/chat/stream/non-existent/abort 验证返回 404"
      - "GET /api/chat/stream/other-user-session/abort 验证返回 403"
      - "快速连续中断5次验证幂等性和无竞态"
    expected:
      - 不存在会话返回404
      - 无权限返回403
      - 重复中断安全
    dependencies: [SMOKE-008]

  - case_id: SMOKE-010
    name: 教师真人介入对话
    type: part_b
    source: "F-01 + F-02 + F-03 + F-05"
    priority: P0
    mock_token_type: mixed
    mock_accounts:
      - alias: teacher_a
        role: teacher
        code: smoke_teacher_001
        description: 介入对话的教师
      - alias: student_1
        role: student
        code: smoke_student_001
        description: 被介入的学生
    steps:
      - "[teacher_a] POST /api/chat/teacher-reply { student_persona_id, message }"
      - "[teacher_a] 验证 sender_type=teacher"
      - "[teacher_a] GET /api/chat/takeover-status 验证 is_taken_over=true"
      - "[student_1] 发消息验证 AI 不回复（教师已接管）"
      - "[student_1] UI验证：切换到学生端，验证聊天界面显示'教师已介入'提示"
      - "[teacher_a] POST /api/chat/end-takeover 结束接管"
      - "[student_1] 发消息验证 AI 恢复回复"
    expected:
      - 教师回复成功标记teacher类型
      - 接管后AI停止
      - 学生端正确显示教师介入状态
      - 结束接管后AI恢复
    dependencies: [SMOKE-007]

  - case_id: SMOKE-011
    name: 新会话创建 + 会话列表 + 标题生成
    type: part_b
    source: "E-04 + E-05 + E-06"
    priority: P0
    mock_token_type: registered_student
    steps:
      - "POST /api/chat/new-session 创建新会话"
      - "验证返回 session_id"
      - "发送几条消息"
      - "POST /api/conversations/sessions/:id/title 生成标题"
      - "GET /api/conversations/sessions 查看会话列表"
      - "验证新会话和标题正确显示"
    expected:
      - 新会话创建成功
      - LLM标题正确生成
      - 会话列表数据正确
    dependencies: [SMOKE-006]

  - case_id: SMOKE-012
    name: 会话列表侧边栏（迭代12新增）
    type: part_b
    source: "IT12-FE-002 + IT12-FE-003 + IT12-FE-004"
    priority: P0
    mock_token_type: registered_student
    steps:
      - "打开左上角会话入口，侧边栏滑入"
      - "GET /api/sessions 加载会话列表"
      - "验证当前会话高亮标识"
      - "点击历史会话切换"
      - "验证消息列表更新"
      - "点击+新会话按钮"
      - "验证侧边栏关闭、消息清空、session_id重置"
    expected:
      - 侧边栏动画流畅
      - 会话数据正确
      - 切换和新建功能正常
    dependencies: [SMOKE-011]

  - case_id: SMOKE-013
    name: 指令系统全面测试（迭代12新增）
    type: part_b
    source: "IT12-FE-005 + IT12-BE-002"
    priority: P1
    mock_token_type: registered_student
    steps:
      - "输入 #新会话 验证清空消息列表、重置session_id"
      - "输入 #新对话 验证同#新会话"
      - "输入 #新话题 验证同#新会话（兼容迭代9）"
      - "输入 #给老师留言 验证进入留言模式"
      - "发送留言内容验证 message_type=teacher_message_direct"
      - "输入 #留言 验证指令别名"
      - "输入普通消息验证不触发指令"
      - "输入 #无效指令 验证作为普通消息发送"
    expected:
      - 所有指令类型正确识别和执行
      - 留言消息类型正确
      - 指令不作为普通消息发送
    dependencies: [SMOKE-012]

  # ================================================================
  # Part C: 知识库与记忆系统（5条）
  # ================================================================

  - case_id: SMOKE-014
    name: 知识库CRUD + 统一输入框
    type: part_c
    source: "H-01 + H-02 + H-03 + H-04 + H-05"
    priority: P0
    mock_token_type: registered_teacher
    steps:
      - "POST /api/documents { title, content } 添加文本文档"
      - "GET /api/documents 查看文档列表"
      - "POST /api/knowledge/upload 智能上传（V8）"
      - "GET /api/knowledge?q=关键词 搜索"
      - "DELETE /api/documents/:id 删除文档"
    expected:
      - 文档CRUD操作正常
      - 智能上传成功
      - 搜索返回匹配结果
    dependencies: [SMOKE-003]

  - case_id: SMOKE-015
    name: Python LlamaIndex语义检索服务
    type: part_c
    source: "知识库+语义检索"
    priority: P0
    mock_token_type: system
    steps:
      - "GET http://localhost:8100/api/v1/health 健康检查"
      - "POST /api/v1/vectors/documents 存储文档向量"
      - "POST /api/v1/vectors/search 语义检索"
      - "验证返回 top-k 相似结果"
    expected:
      - Python服务正常运行
      - 向量存储和检索正常
    dependencies: []

  - case_id: SMOKE-016
    name: 向量召回策略 + Scope控制（迭代11优化）
    type: part_c
    source: "AF-01 + AF-02"
    priority: P1
    mock_token_type: registered_student
    steps:
      - "教师上传≥10条知识库文档（含scope=global）"
      - "学生发送与知识库相关的消息"
      - "检查后端日志：召回≤100条→score≥0.3→scope过滤→≤5条"
      - "验证scope=global对多班级生效"
    expected:
      - 向量召回策略正确执行
      - scope三级控制生效
    dependencies: [SMOKE-014, SMOKE-015]

  - case_id: SMOKE-017
    name: 记忆三层存储 + 摘要合并
    type: part_c
    source: "I-01 + I-02 + I-04"
    priority: P0
    mock_token_type: registered_teacher
    steps:
      - "GET /api/memories 查看记忆列表（含 memory_layer）"
      - "PUT /api/memories/:id 编辑记忆"
      - "POST /api/memories/summarize 触发记忆摘要合并"
      - "验证 core/episodic/archived 三层分类正确"
    expected:
      - 记忆CRUD正常
      - 三层分层正确
      - 摘要合并成功
    dependencies: [SMOKE-007]

  - case_id: SMOKE-018
    name: 画像隐私保护
    type: part_c
    source: "Q-04"
    priority: P1
    mock_token_type: registered_student
    steps:
      - "GET /api/teachers 查看教师列表"
      - "验证返回数据不包含 profile_snapshot 字段"
    expected:
      - profile_snapshot 不暴露给API
    dependencies: [SMOKE-001]

  # ================================================================
  # Part D: 聊天列表与教学管理（4条）
  # ================================================================

  - case_id: SMOKE-019
    name: 学生端与教师端聊天列表（多人场景）
    type: part_d
    source: "G-01 + G-02 + G-06"
    priority: P0
    mock_token_type: mixed
    mock_accounts:
      - alias: teacher_a
        role: teacher
        code: smoke_teacher_001
        description: 主测试教师
      - alias: teacher_b
        role: teacher
        code: smoke_teacher_002
        description: 第二教师（验证学生端多教师列表）
      - alias: student_1
        role: student
        code: smoke_student_001
        description: 学生1（同时关注两个教师）
      - alias: student_2
        role: student
        code: smoke_student_002
        description: 学生2
      - alias: student_3
        role: student
        code: smoke_student_003
        description: 学生3
    steps:
      - "数据准备：teacher_b 注册并创建班级，student_1 加入 teacher_b 的班级"
      - "数据准备：确保 student_1/2/3 都已与 teacher_a 建立关系并有对话记录"
      - "[student_1] UI验证：查看聊天列表，应显示 teacher_a 和 teacher_b 两个教师"
      - "[student_1] 验证按教师→会话二级结构，排版正常"
      - "[teacher_a] UI验证：查看聊天列表，应显示 student_1/2/3 三个学生"
      - "[teacher_a] 验证按班级组织学生，多学生排版正常"
      - "[student_1] POST /api/chat-pins 置顶 teacher_a 的聊天"
      - "[student_1] GET /api/chat-pins 验证置顶生效"
    expected:
      - 学生端正确显示多个教师（排版正常）
      - 教师端正确显示多个学生（排版正常）
      - 置顶功能正常
      - 多人数据下列表无溢出、截断等排版问题
    dependencies: [SMOKE-007]

  - case_id: SMOKE-020
    name: 课程发布与推送
    type: part_d
    source: "K-01 + K-02 + K-03"
    priority: P1
    mock_token_type: registered_teacher
    steps:
      - "POST /api/courses { title, description } 发布课程"
      - "GET /api/courses 查看课程列表"
      - "POST /api/courses/:id/push 推送给学生"
    expected:
      - 课程创建成功
      - 推送成功
    dependencies: [SMOKE-003]

  - case_id: SMOKE-021
    name: 对话风格模板设置
    type: part_d
    source: "J-01 + J-02"
    priority: P1
    mock_token_type: registered_teacher
    steps:
      - "PUT /api/styles { style_template: 'socratic' } 设置苏格拉底式"
      - "GET /api/styles 验证配置已保存"
    expected:
      - 6种风格模板均可设置
      - 配置正确持久化
    dependencies: [SMOKE-003]

  - case_id: SMOKE-022
    name: 教材配置与教师消息推送
    type: part_d
    source: "O-01 + P-01"
    priority: P1
    mock_token_type: registered_teacher
    steps:
      - "POST /api/curriculum-configs 创建教材配置（学段+教材版本）"
      - "GET /api/curriculum-configs 验证配置"
      - "POST /api/teacher-messages 推送消息"
    expected:
      - 教材配置CRUD正常
      - 消息推送成功
    dependencies: [SMOKE-003]

  # ================================================================
  # Part E: 管理员后台与H5平台（4条）
  # ================================================================

  - case_id: SMOKE-023
    name: 管理员仪表盘全套统计
    type: part_e
    source: "S-04 + S-05 + S-06"
    priority: P0
    mock_token_type: admin
    steps:
      - "GET /api/admin/dashboard/overview 系统总览"
      - "GET /api/admin/dashboard/user-stats 用户统计"
      - "GET /api/admin/dashboard/chat-stats 对话统计"
      - "GET /api/admin/dashboard/knowledge-stats 知识库统计"
    expected:
      - 所有统计接口正常返回
      - 数据一致性
    dependencies: []

  - case_id: SMOKE-024
    name: 管理员用户管理 + 禁用用户
    type: part_e
    source: "S-07 + S-08 + S-09 + S-10 + S-11"
    priority: P0
    mock_token_type: admin
    steps:
      - "GET /api/admin/users 获取用户列表"
      - "PUT /api/admin/users/:id/role 修改角色"
      - "PUT /api/admin/users/:id/status { status: 'disabled' } 禁用用户"
      - "被禁用用户访问API 验证返回 403"
      - "被禁用用户登录 验证返回 40003"
    expected:
      - 用户列表正确分页
      - 角色修改成功
      - 禁用后token立即失效
    dependencies: [SMOKE-023]

  - case_id: SMOKE-025
    name: 操作日志查询与CSV导出
    type: part_e
    source: "S-12 + S-13 + S-14"
    priority: P1
    mock_token_type: admin
    steps:
      - "GET /api/admin/logs 查询日志（支持多条件筛选）"
      - "GET /api/admin/logs/stats 日志统计"
      - "GET /api/admin/logs/export 导出CSV"
    expected:
      - 日志记录完整
      - 统计数据正确
      - CSV导出正常
    dependencies: [SMOKE-023]

  - case_id: SMOKE-026
    name: H5微信OAuth登录 + 平台配置 + 文件上传
    type: part_e
    source: "S-01 + S-02 + T-01 + T-02 + T-03"
    priority: P0
    mock_token_type: h5_user
    steps:
      - "GET /api/auth/wx-h5-login-url 获取H5授权URL"
      - "POST /api/auth/wx-h5-callback H5授权回调"
      - "GET /api/platform/config?platform=h5 获取平台配置"
      - "POST /api/upload/h5 正常文件上传"
      - "POST /api/upload/h5（>20MB）验证返回 40021"
    expected:
      - H5登录流程正常
      - 平台配置正确
      - 文件上传/大文件限制正常
    dependencies: []

  # ================================================================
  # Part F: 权限安全与边界（4条）
  # ================================================================

  - case_id: SMOKE-027
    name: 鉴权与角色隔离
    type: part_f
    source: "Q-01 + Q-02 + Q-03"
    priority: P0
