version: "3.8"

services:
  # Python LlamaIndex 语义检索服务
  knowledge:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.knowledge
    container_name: dt-knowledge
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v3}
    volumes:
      - knowledge_data:/app/data
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # Go 后端服务
  backend:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.backend
    container_name: dt-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - LLM_MODE=${LLM_MODE:-api}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen-turbo}
      - VECTOR_DB_MODE=${VECTOR_DB_MODE:-memory}
      - KNOWLEDGE_SERVICE_PORT=8100
      - KNOWLEDGE_SERVICE_HOST=knowledge
      - DB_PATH=/app/data/digital-twin.db
      - SERVER_PORT=8080
    volumes:
      - backend_data:/app/data
      - upload_data:/app/uploads
    depends_on:
      knowledge:
        condition: service_healthy

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: dt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  knowledge_data:
    driver: local
  backend_data:
    driver: local
  upload_data:
    driver: local
