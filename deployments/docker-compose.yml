version: "3.8"

services:
  # Python LlamaIndex 语义检索服务
  knowledge:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.knowledge
    container_name: dt-knowledge
    ports:
      - "8100:8100"
    volumes:
      - knowledge_data:/app/data
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Go 后端服务
  backend:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.backend
    container_name: dt-backend
    ports:
      - "8080:8080"
    volumes:
      - backend_data:/app/data
      - upload_data:/app/uploads
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - VECTOR_SERVICE_URL=http://knowledge:8100
      - DB_PATH=/app/data/digital_twin.db
      - UPLOAD_DIR=/app/uploads
    depends_on:
      knowledge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: dt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  knowledge_data:
  backend_data:
  upload_data:
