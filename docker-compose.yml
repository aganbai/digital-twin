version: '3.8'

services:
  knowledge:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.knowledge
    container_name: digital_twin_knowledge
    env_file:
      - .env.production
    volumes:
      - ./data/vector_store:/app/data/vector_store
    ports:
      - "8100:8100"
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.backend
    container_name: digital_twin_backend
    env_file:
      - .env.production
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./uploads:/app/uploads
      - ./configs:/app/configs
    ports:
      - "8080:8080"
    depends_on:
      knowledge:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: digital_twin_nginx
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
